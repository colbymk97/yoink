name: _build

on:
  workflow_call:

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: darwin-arm64
            os: macos-latest
          - target: darwin-x64
            os: macos-13
          - target: win32-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx vsce package --no-dependencies --target ${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'
          retention-days: 7
