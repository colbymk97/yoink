name: Prerelease

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.1-alpha.2) — no "v" prefix'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.1-alpha.2) — no "v" prefix'
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        id: create
        run: |
          TAG="v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: tag
    uses: ./.github/workflows/_build.yml
    with:
      electron_version: '39.8.3'
      include_runtime_dependencies: true
      rebuild_native_modules: true
      vsix_version: ${{ inputs.version }}

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          prerelease: true
          draft: true
          files: '*.vsix'
          generate_release_notes: true

      - name: Publish release
        run: gh release edit ${{ needs.tag.outputs.tag }} --repo ${{ github.repository }} --draft=false
        env:
          GH_TOKEN: ${{ github.token }}
