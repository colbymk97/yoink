name: _build

on:
  workflow_call:
    inputs:
      vsix_version:
        required: false
        type: string

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: darwin-arm64
            os: macos-latest
          - target: win32-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Resolve VSIX filename
        id: vsix
        shell: bash
        run: |
          VERSION="${{ inputs.vsix_version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          NAME="$(node -p "require('./package.json').name")"
          echo "file=${NAME}-${VERSION}-${{ matrix.target }}.vsix" >> "$GITHUB_OUTPUT"

      - run: npx vsce package --target ${{ matrix.target }} --out "${{ steps.vsix.outputs.file }}"

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: ${{ steps.vsix.outputs.file }}
          retention-days: 7
