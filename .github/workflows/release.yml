name: Release

# Fires on tags like v0.0.1, v1.0.0
# (any v* tag without a hyphen — stable semver only)
on:
  push:
    tags: ['v*']

jobs:
  build:
    if: "!contains(github.ref_name, '-')"
    uses: ./.github/workflows/_build.yml
    with:
      include_runtime_dependencies: true

  release:
    needs: build
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          files: '*.vsix'
          generate_release_notes: true
